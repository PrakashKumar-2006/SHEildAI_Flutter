plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    namespace = "com.shieldai.app"
    compileSdk = 36
    ndkVersion = "28.2.13676358"

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_11
        targetCompatibility = JavaVersion.VERSION_11
        coreLibraryDesugaringEnabled true
    }

    kotlinOptions {
        jvmTarget = "11"
    }

    defaultConfig {
        applicationId = "com.shieldai.app"
        minSdkVersion = flutter.minSdkVersion
        targetSdk = 36
        versionCode = flutter.versionCode
        versionName = flutter.versionName

        // Parse .env file and inject mapsApiKey
        def envFile = rootProject.file("../.env")
        def env = [:]
        if (envFile.exists()) {
            envFile.eachLine { line ->
                def matcher = (line =~ /^\s*([^#\s][^=]+)\s*=\s*(.*)$/)
                if (matcher.matches()) {
                    env[matcher[0][1].trim()] = matcher[0][2].trim().replaceAll('^"|"$|^\\\'|\\\'$', '')
                }
            }
        }
        manifestPlaceholders += [
            mapsApiKey: env['GOOGLE_MAPS_API_KEY'] ?: "MISSING_KEY"
        ]
    }

    buildTypes {
        release {
            signingConfig = signingConfigs.debug
            minifyEnabled false
            shrinkResources false
        }
    }
}

flutter {
    source = "../.."
}

dependencies {
    coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.0.4'
}
